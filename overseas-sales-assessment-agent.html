            white-space: pre-line;
        }

            0%, 100% { transform: translateY(0); }

        }
        .animate-bounce {
            animation: bounce 0.6s ease-in-out infinite;
        }

            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);

<body class="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 p-4 md:p-8">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">🌏 海外销售考核Agent</h1>
            <p class="text-gray-600">基于TCI海外销售考核规则文档的智能问答与奖金计算工具。</p>
        </div>

        <!-- Employee Login Section -->
        <div id="login-section" class="bg-white rounded-2xl shadow-lg p-6 mb-6">

                    验证
                </button>
            </div>

            <p id="login-success" class="mt-2 text-sm text-green-600 hidden"></p>
        </div>

        <!-- Agent Main Interface (hidden until login) -->
        <div id="agent-interface" class="hidden">

            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <div class="chat-container p-4" id="chat-messages">
                    <!-- Welcome Message -->
                    <div class="flex items-start mb-4">
                        <div class="flex-shrink-0 w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                            AI
                        </div>
                        <div class="ml-3 flex-1">
                            <div class="message-ai rounded-2xl rounded-tl-none p-4">
                                <p class="text-gray-800">您好!我是海外销售考核Agent,可以帮您解答关于TCI海外销售考核规则的问题。</p>
                                <p class="text-gray-800 mt-2" id="welcome-region-info"></p>
                                <p class="text-gray-800 mt-2">我能帮您:</p>
                                <ul class="mt-2 space-y-1 text-gray-700">
                                    <li>📊 查询考核规则和计算公式</li>
                                    <li>📖 解读各类考核指标</li>
                                    <li>❓ 回答关于考核体系的任何问题</li>
                                </ul>
                                <p class="text-gray-800 mt-2">示例问题:</p>
                                <ul class="mt-2 space-y-1 text-gray-700">
                                    <li>销售考核公式是什么?</li>
                                    <li>奖金怎么计算?</li>
                                    <li>起付线是多少?</li>
                                    <li>奖金发放频次?</li>
                                    <li>试用期考核规则?</li>
                                </ul>
                                <p class="text-gray-800 mt-2">请随时向我提问!</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area bg-white border-t p-4">
                    <div class="flex gap-2">
                        <input type="text" id="question-input" placeholder="请输入您的问题..."
                            class="flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                            onkeypress="handleKeyPress(event)">
                        <button onclick="sendQuestion()" class="px-6 py-3 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition-colors">
                            发送
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

                        "• 渠道销售: 固浮比70:30\n" +

        // 对话历史上下文
        let conversationHistory = [];

        // 企微名验证功能
        function handleLoginPress(event) {
            if (event.keyCode === 13) {
                event.preventDefault();
                verifyEmployee();
            }
        }

        function verifyEmployee() {
            const wechatNameInput = document.getElementById('wechat-name');
            const wechatName = wechatNameInput.value.trim();
            const errorDiv = document.getElementById('login-error');
            const successDiv = document.getElementById('login-success');

            console.log('验证企微名:', wechatName);

            if (!wechatName) {
                errorDiv.textContent = '请输入企微名';
                errorDiv.classList.remove('hidden');
                successDiv.classList.add('hidden');
                return;
            }

            // 查询员工数据
            const employee = employeeDatabase[wechatName];

            if (employee) {
                // 验证成功
                currentEmployee = employee;
                errorDiv.classList.add('hidden');
                successDiv.textContent = `✅ 验证成功!您是 ${employee.name}，所在地区: ${employee.region === 'na' ? '北美' : '非北美'}`;
                successDiv.classList.remove('hidden');

                // 隐藏登录界面，显示Agent界面
                setTimeout(() => {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('agent-interface').classList.remove('hidden');

                    // 更新欢迎信息
                    const regionName = employee.region === 'na' ? '北美地区' : '非北美地区';
                    const roleName = employee.role === 'direct' ? '直客销售' : employee.role === 'channel' ? '渠道销售' : '销售基干';
                    document.getElementById('welcome-region-info').textContent =
                        `根据您的信息，您属于${regionName}，角色是${roleName}。我将为您展示对应地区的考核规则。`;
                }, 1000);
            } else {
                // 验证失败
                errorDiv.textContent = '❌ 未找到您的企微名，请联系HR确认';
                errorDiv.classList.remove('hidden');
                successDiv.classList.add('hidden');
                currentEmployee = null;
            }
        }

        // 处理按键事件
        function handleKeyPress(event) {
            console.log('按键事件触发:', event.keyCode);
            if (event.keyCode === 13) {
                event.preventDefault();
                sendQuestion();
            }
        }

        // 问答功能
        function sendQuestion() {
            console.log('sendQuestion 函数被调用');
            const input = document.getElementById('question-input');
            const question = input.value.trim();

            console.log('问题内容:', question);

            if (!question) {
                console.log('问题为空,返回');
                return;
            }

            // 添加用户消息
            addMessage(question, 'user');
            input.value = '';

            // 添加到对话历史
            conversationHistory.push({ role: 'user', content: question });

            // 显示"正在输入"状态
            showTypingIndicator();

            // 模拟AI思考和回复
            setTimeout(() => {
                removeTypingIndicator();
                const answer = generateAnswer(question, conversationHistory);
                addMessage(answer, 'ai');
                conversationHistory.push({ role: 'assistant', content: answer });
            }, 800 + Math.random() * 700);
        }

        function addMessage(text, sender) {
            console.log('添加消息:', sender, text);
            const container = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start mb-4 ${sender === 'user' ? 'justify-end' : ''}`;

            if (sender === 'user') {
                messageDiv.innerHTML = `
                    <div class="ml-3 flex-1 flex justify-end">
                        <div class="message-user rounded-2xl rounded-tr-none p-4 max-w-xs">
                            <p>${text}</p>
                        </div>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="flex-shrink-0 w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                        AI
                    </div>
                    <div class="ml-3 flex-1">
                        <div class="message-ai rounded-2xl rounded-tl-none p-4">
                            <p class="text-gray-800">${text}</p>
                        </div>
                    </div>
                `;
            }

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showTypingIndicator() {
            const container = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'flex items-start mb-4';
            typingDiv.innerHTML = `
                <div class="flex-shrink-0 w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                    AI
                </div>
                <div class="ml-3">
                    <div class="message-ai rounded-2xl rounded-tl-none p-4">
                        <div class="flex gap-1">
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0s"></span>
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function generateAnswer(question, history) {
            const q = question.toLowerCase();
            console.log('分析问题:', q);

            // 检查是否已登录
            if (!currentEmployee) {
                return '请先输入企微名进行身份验证。';
            }

            const region = currentEmployee.region;
            const role = currentEmployee.role;

            // 优先级1: 宽泛规则查询(如"规则是什么"、"考核规则怎么样")
            if (q.includes('规则') || q.includes('政策') || q.includes('怎么样') || q.includes('是什么')) {
                console.log('匹配到宽泛规则问题');
                return knowledgeBase.regionRules[region].overview + '\n\n需要了解更详细的规则吗?您可以问我:\n• 综合完成率怎么计算?\n• 奖金怎么算?\n• 固浮比是多少?';
            }

            // 优先级2: 综合完成率相关问题
            if (q.includes('综合完成率') || q.includes('综合率') || q.includes('完成率怎么算')) {
                return knowledgeBase.regionRules[region].comprehensiveRate;
            }

            // 优先级3: 收入完成率
            if (q.includes('收入完成率') || q.includes('收入怎么算')) {
                return knowledgeBase.regionRules[region].revenueRate;
            }

            // 优先级4: 考核分数
            if (q.includes('考核分数') || q.includes('分数')) {
                return knowledgeBase.regionRules[region].overallScore;
            }

            // 优先级5: 固浮比/薪酬结构
            if (q.includes('固浮') || q.includes('固浮比') || q.includes('薪酬结构') || q.includes('薪资结构')) {
                return knowledgeBase.regionRules[region].salaryStructure;
            }

            // 优先级6: 奖金计算
            if (q.includes('奖金') || q.includes('计算') || q.includes('怎么算')) {
                return knowledgeBase.regionRules[region].bonusCalculation;
            }

            // 优先级7: 发放时间
            if (q.includes('发放时间') || q.includes('什么时候发') || q.includes('何时发放') || q.includes('结算时间')) {
                return knowledgeBase.regionRules[region].payout;
            }

            // 优先级8: 起付线
            if (q.includes('起付线') || q.includes('起付') || q.includes('发放门槛')) {
                const regionName = region === 'na' ? '北美' : '非北美';
                const threshold = region === 'na' ? '>50%' : (role === 'leader' ? '60%' : '无');
                return `🎯 ${regionName}地区起付线:\n\n${threshold}\n\n注意: 起付线是发放奖金的最低完成率要求,低于起付线将不发放奖金。`;
            }

            // 优先级9: 试用期
            if (q.includes('试用期') || q.includes('新员工') || q.includes('入职')) {
                const probationRule = region === 'na' ?
                    '🇺🇸 北美地区: 入职当月即参与考核' :
                    '🌍 非北美地区: 入职3个月内不参与考核';
                return '👤 试用期规则:\n\n' + probationRule + '\n\n新员工在试用期的奖金计算方式有所不同,具体请参考考核规则文档。';
            }

            // 优先级10: 离职结算
            if (q.includes('离职') || q.includes('离职结算') || q.includes('离开')) {
