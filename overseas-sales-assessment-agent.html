<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外销售考核Agent v1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        .chat-container {
            height: calc(100vh - 200px);
            overflow-y: auto;
        }
        .message-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message-ai {
            background: #f3f4f6;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce {
            animation: bounce 0.6s ease-in-out infinite;
        }
        .input-area {
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }
        .result-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-4xl mx-auto p-4">
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">🌏 海外销售考核Agent</h1>
            <p class="text-gray-600 text-sm">基于TCI海外销售考核规则的智能问答与奖金计算工具</p>
        </div>

        <!-- Tab Switcher -->
        <div class="flex gap-4 mb-4">
            <button onclick="switchTab('qa')" id="btn-qa" class="tab-btn flex-1 py-3 px-6 rounded-xl font-medium transition-all bg-white text-purple-600 shadow-lg">
                💬 规则问答
            </button>
            <button onclick="switchTab('calculator')" id="btn-calculator" class="tab-btn flex-1 py-3 px-6 rounded-xl font-medium transition-all bg-gray-200 text-gray-600">
                💰 奖金计算器
            </button>
        </div>

        <!-- Q&A Tab -->
        <div id="tab-qa" class="tab-content">
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <div class="chat-container p-4" id="chat-messages">
                    <!-- Welcome Message -->
                    <div class="flex items-start mb-4">
                        <div class="flex-shrink-0 w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                            AI
                        </div>
                        <div class="ml-3 flex-1">
                            <div class="message-ai rounded-2xl rounded-tl-none p-4">
                                <p class="text-gray-800">您好!我是海外销售考核Agent,可以帮您解答关于TCI海外销售考核规则的问题。</p>
                                <p class="text-gray-800 mt-2">我能帮您:</p>
                                <ul class="mt-2 space-y-1 text-gray-700">
                                    <li>📊 查询考核规则和计算公式</li>
                                    <li>💰 计算销售奖金</li>
                                    <li>📖 解读各类考核指标</li>
                                    <li>❓ 回答关于考核体系的任何问题</li>
                                </ul>
                                <p class="text-gray-800 mt-2">请随时向我提问!</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area bg-white border-t p-4">
                    <div class="flex gap-2">
                        <input type="text" id="question-input" placeholder="请输入您的问题..." 
                            class="flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                            onkeypress="if(event.key==='Enter')sendQuestion()">
                        <button onclick="sendQuestion()" class="px-6 py-3 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition-colors">
                            发送
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calculator Tab -->
        <div id="tab-calculator" class="tab-content hidden">
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-6">💰 销售奖金计算器</h2>

                <!-- Input Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">地区</label>
                        <select id="region" onchange="updateCalculator()" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="na">北美 (North America)</option>
                            <option value="non_na">非北美 (Non-North America)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">销售角色</label>
                        <select id="role" onchange="updateCalculator()"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="direct">直客销售 (Direct Sales)</option>
                            <option value="channel">渠道销售 (Channel Sales)</option>
                            <option value="leader">销售基干 (Sales Leader)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">月薪基数</label>
                        <input type="number" id="monthlySalary" placeholder="例如: 20000"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                            oninput="updateCalculator()">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">综合完成率 (%)</label>
                        <input type="number" id="achievementRate" placeholder="例如: 120" step="0.01"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                            oninput="updateCalculator()">
                    </div>
                </div>

                <!-- Calculation Result -->
                <div id="result-section" class="hidden">
                    <div class="result-box rounded-2xl p-6 text-white mb-6">
                        <h3 class="text-lg font-bold mb-4">📊 计算结果</h3>
                        <div>
                            <p class="text-purple-100 text-sm mb-1">销售奖金</p>
                            <p id="salesBonus" class="text-3xl font-bold">¥0</p>
                        </div>
                        <div id="breakdown-section" class="mt-4 pt-4 border-t border-purple-400">
                            <p class="text-purple-100 text-sm mb-2">计算明细:</p>
                            <p id="breakdown" class="text-sm text-purple-50"></p>
                        </div>
                    </div>

                    <!-- Payment Threshold -->
                    <div id="threshold-section" class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl">
                        <p class="text-yellow-800 text-sm">
                            <span id="threshold-warning">⚠️ 起付线: 0% - 可以发放奖金</span>
                        </p>
                    </div>
                </div>

                <!-- Region Info -->
                <div class="mt-6 p-4 bg-gray-50 rounded-xl">
                    <h4 class="font-medium text-gray-800 mb-2">📝 当前规则说明</h4>
                    <p id="rule-description" class="text-sm text-gray-600"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 考核规则知识库
        const knowledgeBase = {
            comprehensiveRate: {
                direct: "直客销售: 综合完成率 = 个人收入完成率×50% + 团队收入完成率×20% + 综合考核分数×30%",
                channel: "渠道销售: 综合完成率 = 团队收入完成率×40% + 团队毛利完成率×30% + 综合考核分数×30%",
                leader: "销售基干: 综合完成率 = 团队收入完成率×40% + 团队毛利完成率×30% + 综合考核分数×30%"
            },
            revenueRate: {
                non_na: "海外非北美&中国大陆: 收入完成率 = (YTD考核收入 - 超期6个月扣减) / 全年收入KPI",
                na: "北美地区: 收入完成率 = YTD实收收入 / YTD实收收入KPI"
            },
            comprehensiveScore: {
                direct: "直客销售参考指标: 回款率、毛利额完成率、重点/新客户突破",
                channel: "渠道销售参考指标: 回款率、毛利额完成率、重点/新客户突破",
                leader: "销售基干参考指标: 回款率、毛利额完成率、重点/新客户突破、渠道收入完成率"
            },
            salaryStructure: {
                na: { direct: "直客销售固浮比 50:50", channel: "渠道销售固浮比 70:30" },
                non_na: { direct: "直客销售固浮比 60:40", channel: "渠道销售固浮比 70:30" },
                cn: { direct: "直客销售固浮比 50:50", channel: "渠道销售固浮比 60:40" }
            },
            payout: {
                na: "北美: 季度发放。次月10-20日启动考核,月末确定完成率,次次月发放。",
                non_na: "非北美: 年度结算。次年1月确认业绩,2-3月发放。",
                cn: "中国大陆: 年度结算。次年1月确认业绩,2-3月发放。"
            },
            threshold: {
                na: { individual: "50%", leader: "50%" },
                non_na: { individual: "无", leader: "60%" },
                cn: { individual: "无", leader: "60%" }
            },
            northAmericaBonus: {
                description: "北美季度销售奖金计算规则:",
                tiers: [
                    "51%-100%: 系数1",
                    "101%-160%: 超过100%部分系数2.5",
                    "161%-300%: 超过160%部分系数1"
                ]
            },
            probation: {
                na: "北美: 入职当月即设置KPI、参与考核",
                non_na: "非北美: 入职3个月内不设置KPI、不参与考核"
            },
            resignation: {
                america: "美洲(美国、巴西): 完整季度周期后离职,离职前的季度奖金需要计算支付",
                europe: "欧洲: 契约性国家(荷兰、意大利、德国)需要结算,裁量性国家(英国、法国、迪拜)不结算",
                hk: "中国香港: 需要结算,截止到离职当月月底业绩数据",
                cn: "中国大陆: 需要结算,截止到离职当月月底业绩数据",
                other: "其他海外国家: 在奖金发放日前离职,不结算奖金"
            },
            maternity: "产假/休长假: 员工的奖金基数不受产假影响;制定KPI时需提醒leader,奖金基数不受产假天数影响"
        };

        // Tab切换
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-white', 'text-purple-600', 'shadow-lg');
                el.classList.add('bg-gray-200', 'text-gray-600');
            });

            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.remove('bg-gray-200', 'text-gray-600');
            document.getElementById(`btn-${tab}`).classList.add('bg-white', 'text-purple-600', 'shadow-lg');
        }

        // 对话历史上下文
        let conversationHistory = [];

        // 问答功能
        function sendQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            if (!question) return;

            // 添加用户消息
            addMessage(question, 'user');
            input.value = '';

            // 添加到对话历史
            conversationHistory.push({ role: 'user', content: question });

            // 显示"正在输入"状态
            showTypingIndicator();

            // 模拟AI思考和回复
            setTimeout(() => {
                removeTypingIndicator();
                const answer = generateAnswer(question, conversationHistory);
                addMessage(answer, 'ai');
                conversationHistory.push({ role: 'assistant', content: answer });
            }, 800 + Math.random() * 700); // 随机延迟800-1500ms,更自然
        }

        function showTypingIndicator() {
            const container = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'flex items-start mb-4';
            typingDiv.innerHTML = `
                <div class="flex-shrink-0 w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                    AI
                </div>
                <div class="ml-3 flex-1">
                    <div class="message-ai rounded-2xl rounded-tl-none p-4">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typing-indicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }

        function addMessage(text, type) {
            const container = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex items-start mb-4';

            if (type === 'user') {
                messageDiv.innerHTML = `
                    <div class="flex-1 flex justify-end">
                        <div class="message-user rounded-2xl rounded-tr-none p-4 max-w-md">
                            <p class="text-white">${text}</p>
                        </div>
                    </div>
                    <div class="flex-shrink-0 w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center text-gray-600 font-bold ml-3">
                        You
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="flex-shrink-0 w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                        AI
                    </div>
                    <div class="ml-3 flex-1">
                        <div class="message-ai rounded-2xl rounded-tl-none p-4">
                            <p class="text-gray-800">${text}</p>
                        </div>
                    </div>
                `;
            }

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function generateAnswer(question, history) {
            const lowerQuestion = question.toLowerCase();

            // 检查是否需要引导到计算器
            if (lowerQuestion.includes('计算') && (lowerQuestion.includes('奖金') || lowerQuestion.includes('多少钱'))) {
                return `好的!我可以帮您计算销售奖金。请点击上方的"奖金计算器"标签,然后输入以下信息:\n\n📋 需要输入:\n1. 地区(北美/非北美)\n2. 销售角色(直客/渠道/基干)\n3. 月薪基数\n4. 综合完成率\n\n我会自动根据固浮比计算结果!`;
            }

            // 上下文感知:如果之前问过相关话题,提供更个性化的回答
            const lastQuestion = history.length > 2 ? history[history.length - 3].content.toLowerCase() : '';

            if (lowerQuestion.includes('综合完成率') || lowerQuestion.includes('完成率计算')) {
                const role = lowerQuestion.includes('直客') ? 'direct' :
                            lowerQuestion.includes('渠道') ? 'channel' :
                            lowerQuestion.includes('基干') ? 'leader' : null;
                return role ? knowledgeBase.comprehensiveRate[role] :
                    `请指定销售角色(直客销售/渠道销售/销售基干)。\n\n${knowledgeBase.comprehensiveRate.direct}\n${knowledgeBase.comprehensiveRate.channel}\n${knowledgeBase.comprehensiveRate.leader}`;
            }

            if (lowerQuestion.includes('收入完成率') || lowerQuestion.includes('收入计算')) {
                return `${knowledgeBase.revenueRate.non_na}\n${knowledgeBase.revenueRate.na}`;
            }

            if (lowerQuestion.includes('综合考核分数') || lowerQuestion.includes('参考指标')) {
                const role = lowerQuestion.includes('直客') ? 'direct' :
                            lowerQuestion.includes('渠道') ? 'channel' :
                            lowerQuestion.includes('基干') ? 'leader' : null;
                return role ? knowledgeBase.comprehensiveScore[role] :
                    `请指定销售角色。\n\n${knowledgeBase.comprehensiveScore.direct}\n${knowledgeBase.comprehensiveScore.channel}\n${knowledgeBase.comprehensiveScore.leader}`;
            }

            if (lowerQuestion.includes('固浮比') || lowerQuestion.includes('薪酬结构')) {
                let answer = "";
                ['na', 'non_na', 'cn'].forEach(region => {
                    const regionName = region === 'na' ? '北美' : region === 'non_na' ? '非北美' : '中国大陆';
                    answer += `\n${regionName}:\n`;
                    answer += `  ${knowledgeBase.salaryStructure[region].direct}\n`;
                    answer += `  ${knowledgeBase.salaryStructure[region].channel}\n`;
                });
                return answer;
            }

            if (lowerQuestion.includes('发放时间') || lowerQuestion.includes('何时发放')) {
                let answer = "";
                Object.keys(knowledgeBase.payout).forEach(region => {
                    const regionName = region === 'na' ? '北美' : region === 'non_na' ? '非北美' : '中国大陆';
                    answer += `\n${regionName}: ${knowledgeBase.payout[region]}\n`;
                });
                return answer;
            }

            if (lowerQuestion.includes('起付线') || lowerQuestion.includes('门槛')) {
                let answer = "";
                Object.keys(knowledgeBase.threshold).forEach(region => {
                    const regionName = region === 'na' ? '北美' : region === 'non_na' ? '非北美' : '中国大陆';
                    answer += `\n${regionName}:\n`;
                    answer += `  销售个人: ${knowledgeBase.threshold[region].individual}\n`;
                    answer += `  销售基干: ${knowledgeBase.threshold[region].leader}\n`;
                });
                return answer;
            }

            if (lowerQuestion.includes('北美') && (lowerQuestion.includes('奖金') || lowerQuestion.includes('计算'))) {
                let answer = `${knowledgeBase.northAmericaBonus.description}\n\n`;
                knowledgeBase.northAmericaBonus.tiers.forEach(tier => {
                    answer += `• ${tier}\n`;
                });
                return answer;
            }

            if (lowerQuestion.includes('试用期') || lowerQuestion.includes('入职')) {
                return `试用期KPI规则:\n\n${knowledgeBase.probation.na}\n${knowledgeBase.probation.non_na}\n\n对于10-12月入职的非北美地区销售,需要在offer阶段和入职当周进行详细的销售考核规则、奖金计算介绍。`;
            }

            if (lowerQuestion.includes('离职') || lowerQuestion.includes('结算')) {
                return `离职奖金结算规则:\n\n${knowledgeBase.resignation.america}\n${knowledgeBase.resignation.europe}\n${knowledgeBase.resignation.hk}\n${knowledgeBase.resignation.cn}\n${knowledgeBase.resignation.other}`;
            }

            if (lowerQuestion.includes('产假') || lowerQuestion.includes('休假')) {
                return `${knowledgeBase.maternity}\n\n💡 需要计算产假期间的奖金吗?我可以根据您的月薪和固浮比帮您计算。`;
            }

            // 无法识别的问题,提供帮助
            let helpSuggestions = "我可以帮您解答关于:\n\n";
            helpSuggestions += "📊 **考核规则**\n";
            helpSuggestions += "• 综合完成率如何计算\n";
            helpSuggestions += "• 不同角色的考核指标\n";
            helpSuggestions += "• 薪酬结构(固浮比)\n\n";
            helpSuggestions += "💰 **奖金计算**\n";
            helpSuggestions += "• 点击"奖金计算器"标签进行计算\n";
            helpSuggestions += "• 支持北美和非北美地区\n";
            helpSuggestions += "• 自动应用对应的固浮比\n\n";
            helpSuggestions += "📖 **其他规则**\n";
            helpSuggestions += "• 发放时间和周期\n";
            helpSuggestions += "• 起付线要求\n";
            helpSuggestions += "• 离职和休假规则\n\n";
            helpSuggestions += "请告诉我您想了解哪方面的问题,或者直接点击"奖金计算器"开始计算!";

            return helpSuggestions;
        }

        // 奖金计算器功能
        function updateCalculator() {
            const region = document.getElementById('region').value;
            const role = document.getElementById('role').value;
            const monthlySalary = parseFloat(document.getElementById('monthlySalary').value) || 0;
            const achievementRate = parseFloat(document.getElementById('achievementRate').value) || 0;

            // 更新规则说明
            updateRuleDescription(region, role);

            // 计算奖金
            if (monthlySalary > 0 && achievementRate > 0) {
                const result = calculateBonus(region, role, monthlySalary, achievementRate);
                displayResult(result, achievementRate, region, role);
            } else {
                document.getElementById('result-section').classList.add('hidden');
            }
        }

        function updateRuleDescription(region, role) {
            const description = document.getElementById('rule-description');
            let text = "";
            const fixedRatio = getFixedRatio(region, role);

            if (region === 'na') {
                text = `北美季度奖金计算: 固浮比 ${fixedRatio}。${knowledgeBase.payout.na}\n季度销售奖金 = 年薪 × 浮动部分比例 × 季度系数 × 奖金系数`;
            } else if (region === 'non_na') {
                text = `非北美年度奖金计算: 固浮比 ${fixedRatio}。${knowledgeBase.payout.non_na}\n年度销售奖金 = 年薪 × 浮动部分比例 × 综合完成率`;
            }

            description.textContent = text;
        }

        function getFixedRatio(region, role) {
            if (region === 'na') {
                return role === 'direct' ? '50:50' : '70:30';
            } else if (region === 'non_na') {
                return role === 'direct' ? '60:40' : '70:30';
            }
            return '-';
        }

        function calculateBonus(region, role, monthlySalary, achievementRate) {
            let salesBonus = 0;
            let breakdown = "";

            // 限制完成率最大值为300%
            achievementRate = Math.min(achievementRate, 300);

            // 根据地区和角色获取浮动部分比例
            const fixedRatio = getFixedRatio(region, role);
            const variableRatio = parseFloat(fixedRatio.split(':')[1]) / 100;

            if (region === 'na') {
                // 北美季度奖金计算
                const annualSalary = monthlySalary * 12;
                const quarterlySalary = annualSalary * variableRatio / 4; // 季度浮动薪资

                if (achievementRate >= 51 && achievementRate <= 100) {
                    salesBonus = quarterlySalary * (achievementRate / 100) * 1;
                    breakdown = `年薪: ¥${annualSalary.toLocaleString()}\n浮动部分: ${fixedRatio}\n季度基数: ¥${quarterlySalary.toLocaleString()}\n51%-100%区间: ¥${quarterlySalary.toLocaleString()} × ${(achievementRate/100).toFixed(2)} × 1 = ¥${salesBonus.toLocaleString()}`;
                } else if (achievementRate > 100 && achievementRate <= 160) {
                    const base = quarterlySalary * 1;
                    const excess = quarterlySalary * ((achievementRate - 100) / 100) * 2.5;
                    salesBonus = base + excess;
                    breakdown = `年薪: ¥${annualSalary.toLocaleString()}\n浮动部分: ${fixedRatio}\n季度基数: ¥${quarterlySalary.toLocaleString()}\n100%部分: ¥${quarterlySalary.toLocaleString()} × 1 = ¥${base.toLocaleString()}\n超过100%部分: ¥${quarterlySalary.toLocaleString()} × ${((achievementRate-100)/100).toFixed(2)} × 2.5 = ¥${excess.toLocaleString()}`;
                } else if (achievementRate > 160) {
                    const base = quarterlySalary * 1;
                    const tier1 = quarterlySalary * (60 / 100) * 2.5;
                    const tier2 = quarterlySalary * ((achievementRate - 160) / 100) * 1;
                    salesBonus = base + tier1 + tier2;
                    breakdown = `年薪: ¥${annualSalary.toLocaleString()}\n浮动部分: ${fixedRatio}\n季度基数: ¥${quarterlySalary.toLocaleString()}\n100%部分: ¥${quarterlySalary.toLocaleString()} × 1 = ¥${base.toLocaleString()}\n101%-160%: ¥${quarterlySalary.toLocaleString()} × 0.6 × 2.5 = ¥${tier1.toLocaleString()}\n超过160%部分: ¥${quarterlySalary.toLocaleString()} × ${((achievementRate-160)/100).toFixed(2)} × 1 = ¥${tier2.toLocaleString()}`;
                } else {
                    // 低于51%,不发放奖金
                    salesBonus = 0;
                    breakdown = `完成率${achievementRate}%低于起付线51%,不发放奖金`;
                }
            } else if (region === 'non_na') {
                // 非北美年度奖金计算
                const annualSalary = monthlySalary * 12;
                salesBonus = annualSalary * variableRatio * (achievementRate / 100);
                breakdown = `年薪: ¥${annualSalary.toLocaleString()}\n浮动部分: ${fixedRatio}\n年度奖金 = ¥${annualSalary.toLocaleString()} × ${(achievementRate/100).toFixed(2)} = ¥${salesBonus.toLocaleString()}`;
            }

            return { salesBonus, breakdown };
        }

        function displayResult(result, achievementRate, region, role) {
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('salesBonus').textContent = `¥${result.salesBonus.toLocaleString()}`;
            document.getElementById('breakdown').textContent = result.breakdown;

            // 起付线警告
            const thresholdWarning = document.getElementById('threshold-warning');
            const threshold = region === 'na' ? 51 : region === 'non_na' ? (role === 'leader' ? 60 : 0) : 0;

            if (achievementRate < threshold) {
                thresholdWarning.textContent = `⚠️ 起付线: ${threshold}% - 未达到起付线,不能发放奖金`;
                document.getElementById('threshold-section').className = 'bg-red-50 border-l-4 border-red-400 p-4 rounded-r-xl';
                document.getElementById('threshold-section').querySelector('p').className = 'text-red-800 text-sm';
            } else {
                thresholdWarning.textContent = `✅ 起付线: ${threshold}% - 已达到起付线,可以发放奖金`;
                document.getElementById('threshold-section').className = 'bg-green-50 border-l-4 border-green-400 p-4 rounded-r-xl';
                document.getElementById('threshold-section').querySelector('p').className = 'text-green-800 text-sm';
            }
        }

        // 初始化
        updateCalculator();
    </script>
</body>
</html>
