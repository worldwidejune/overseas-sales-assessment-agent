<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 p-8">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold text-center mb-8">JavaScript 测试</h1>

            <div class="bg-white rounded-2xl shadow-lg p-6">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">测试输入</label>
                    <input type="text" id="test-input" placeholder="输入内容..."
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                        onkeypress="if(event.keyCode===13)handleInput()">
                </div>

                <button onclick="handleInput()" class="px-6 py-3 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition-colors">
                    测试按钮
                </button>

                <div id="output" class="mt-6 p-4 bg-gray-50 rounded-xl">
                    <p class="text-gray-600">等待输入...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleInput() {
            console.log('handleInput 被调用');
            const input = document.getElementById('test-input');
            const output = document.getElementById('output');
            const value = input.value;

            console.log('输入值:', value);

            if (value) {
                output.innerHTML = `<p class="text-green-600">✅ 成功!</p><p class="text-gray-800">你输入了: <strong>${value}</strong></p>`;
                input.value = '';
            } else {
                output.innerHTML = '<p class="text-red-600">❌ 请输入内容</p>';
            }
        }

        console.log('脚本已加载');
        console.log('handleInput 函数:', typeof handleInput);
    </script>
</body>
</html>
